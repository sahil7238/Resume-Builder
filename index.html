<!DOCTYPE html>
<html lang="en">
<head>
  <title>Resume Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --beige: #e8dcd2;
      --beige-dark: #d4c4b5;
      --dark: #2c2c2c;
      --accent: #8b6f5e;
      --white: #ffffff;
      --light-bg: #f7f4f1;
      --border: #ccc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--light-bg);
      color: var(--dark);
      min-height: 100vh;
    }

    header {
      background: var(--dark);
      color: white;
      padding: 22px 40px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      letter-spacing: 1px;
    }

    header span {
      font-size: 13px;
      color: #aaa;
      font-weight: 300;
    }

    .container {
      max-width: 860px;
      margin: 40px auto;
      padding: 0 20px 60px;
    }

    .card {
      background: white;
      border-radius: 4px;
      padding: 32px 36px;
      margin-bottom: 24px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: var(--accent);
      border-bottom: 2px solid var(--beige);
      padding-bottom: 10px;
      margin-bottom: 22px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .photo-upload-area {
      display: flex;
      align-items: center;
      gap: 28px;
      margin-bottom: 24px;
    }

    #photo-preview {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--beige);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 3px solid var(--beige-dark);
      flex-shrink: 0;
    }

    #photo-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #photo-preview .placeholder {
      font-size: 36px;
      color: var(--accent);
      opacity: 0.5;
    }

    .photo-btn {
      background: var(--beige);
      color: var(--dark);
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border-radius: 3px;
      transition: background 0.2s;
    }

    .photo-btn:hover { background: var(--beige-dark); }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
    }

    input, textarea {
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 10px 13px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 15px;
      color: var(--dark);
      background: #fafafa;
      transition: border-color 0.2s, background 0.2s;
      width: 100%;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: white;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .exp-block, .edu-block {
      background: var(--light-bg);
      border: 1px solid #e0d8d0;
      border-left: 3px solid var(--accent);
      border-radius: 3px;
      padding: 20px;
      margin-bottom: 16px;
      position: relative;
    }

    .remove-btn {
      position: absolute;
      top: 12px;
      right: 14px;
      background: none;
      border: 1px solid #ccc;
      color: #999;
      font-size: 12px;
      padding: 3px 9px;
      cursor: pointer;
      border-radius: 3px;
      font-family: 'Source Sans 3', sans-serif;
      transition: all 0.2s;
    }

    .remove-btn:hover {
      background: #fee;
      border-color: #e88;
      color: #c44;
    }

    .add-btn {
      background: none;
      border: 2px dashed var(--beige-dark);
      color: var(--accent);
      font-size: 14px;
      font-weight: 600;
      font-family: 'Source Sans 3', sans-serif;
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 3px;
      width: 100%;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .add-btn:hover {
      background: var(--beige);
      border-color: var(--accent);
    }

    .generate-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: var(--dark);
      color: white;
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      letter-spacing: 2px;
      border: none;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.2s;
      margin-top: 10px;
    }

    .generate-btn:hover { background: #444; }

    @media (max-width: 600px) {
      .row { grid-template-columns: 1fr; }
      .card { padding: 22px 18px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Resume Builder</h1>
    <span>Fill in your details and generate a professional resume</span>
  </div>
</header>

<div class="container">

  <div class="card">
    <div class="card-title">Personal Information</div>
    <div class="photo-upload-area">
      <div id="photo-preview">
        <span class="placeholder">👤</span>
      </div>
      <div>
        <p style="font-size:14px;color:#666;margin-bottom:10px;">Upload a professional photo</p>
        <button class="photo-btn" onclick="document.getElementById('photo-input').click()">Choose Photo</button>
        <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="previewPhoto(event)">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Full Name</label>
        <input id="name" placeholder="e.g. Jacqueline Thompson">
      </div>
      <div class="field">
        <label>Job Title</label>
        <input id="title" placeholder="e.g. Digital Marketing Executive">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Contact Details</div>
    <div class="row">
      <div class="field">
        <label>Phone</label>
        <input id="phone" placeholder="+123-456-7890">
      </div>
      <div class="field">
        <label>Email</label>
        <input id="email" placeholder="hello@example.com">
      </div>
      <div class="field">
        <label>Address</label>
        <input id="address" placeholder="123 Anywhere St., Any City">
      </div>
      <div class="field">
        <label>Website (optional)</label>
        <input id="website" placeholder="www.yoursite.com">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Professional Summary</div>
    <div class="field">
      <label>Summary</label>
      <textarea id="summary" placeholder="Results-driven professional with a proven track record in..."></textarea>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Skills</div>
    <div class="field">
      <label>Skills (comma separated)</label>
      <input id="skills" placeholder="e.g. Digital Marketing Strategy, SEO Optimization, Email Marketing">
    </div>
  </div>

  <div class="card">
    <div class="card-title">Work Experience</div>
    <div id="experience-container">
      <div class="exp-block">
        <div class="row">
          <div class="field">
            <label>Job Title / Role</label>
            <input class="role" placeholder="e.g. Digital Marketing Specialist">
          </div>
          <div class="field">
            <label>Company</label>
            <input class="company" placeholder="e.g. Borcelle Marketing Agency">
          </div>
          <div class="field">
            <label>Duration</label>
            <input class="years" placeholder="e.g. Jan 2023 – Present">
          </div>
        </div>
        <div class="field">
          <label>Responsibilities / Achievements</label>
          <textarea class="details" placeholder="• Developed and executed strategies...&#10;• Managed social media campaigns..."></textarea>
        </div>
      </div>
    </div>
    <button class="add-btn" onclick="addExperience()">+ Add Another Job</button>
  </div>

  <div class="card">
    <div class="card-title">Education</div>
    <div id="education-container">
      <div class="edu-block">
        <div class="row">
          <div class="field">
            <label>Degree / Qualification</label>
            <input class="degree" placeholder="e.g. Bachelor of Business Administration">
          </div>
          <div class="field">
            <label>Field of Study</label>
            <input class="field-study" placeholder="e.g. in Marketing">
          </div>
          <div class="field">
            <label>School / University</label>
            <input class="school" placeholder="e.g. University of Business Excellence">
          </div>
          <div class="field">
            <label>Year / Duration</label>
            <input class="year" placeholder="e.g. Sep 2017 – Oct 2020">
          </div>
        </div>
        <div class="field">
          <label>Notable Achievements (optional)</label>
          <textarea class="edu-details" placeholder="• Thesis on 'Innovative Strategies...'&#10;• Specialization in Digital Marketing" style="min-height:60px;"></textarea>
        </div>
      </div>
    </div>
    <button class="add-btn" onclick="addEducation()">+ Add Education</button>
  </div>

  <div class="card">
    <div class="card-title">Certifications</div>
    <div id="cert-container">
      <div class="cert-block" style="display:flex;gap:12px;margin-bottom:12px;">
        <input class="cert-name" placeholder="e.g. Certified Digital Marketing Professional (CDMP)" style="flex:2">
        <input class="cert-org" placeholder="Issuing Organization" style="flex:1">
      </div>
    </div>
    <button class="add-btn" onclick="addCert()">+ Add Certification</button>
  </div>

  <button class="generate-btn" onclick="generate()">GENERATE RESUME →</button>

</div>

<script>
  function previewPhoto(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('photo-preview').innerHTML = `<img src="${e.target.result}" alt="Photo">`;
      window._photoData = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function addExperience() {
    const container = document.getElementById("experience-container");
    const block = document.createElement("div");
    block.classList.add("exp-block");
    block.innerHTML = `
      <button class="remove-btn" onclick="this.parentElement.remove()">✕ Remove</button>
      <div class="row">
        <div class="field"><label>Job Title / Role</label><input class="role" placeholder="e.g. Marketing Coordinator"></div>
        <div class="field"><label>Company</label><input class="company" placeholder="e.g. Stafford & Co"></div>
        <div class="field"><label>Duration</label><input class="years" placeholder="e.g. July 2021 – Dec 2022"></div>
      </div>
      <div class="field"><label>Responsibilities / Achievements</label><textarea class="details" placeholder="• Coordinated events..."></textarea></div>
    `;
    container.appendChild(block);
  }

  function addEducation() {
    const container = document.getElementById("education-container");
    const block = document.createElement("div");
    block.classList.add("edu-block");
    block.innerHTML = `
      <button class="remove-btn" onclick="this.parentElement.remove()">✕ Remove</button>
      <div class="row">
        <div class="field"><label>Degree / Qualification</label><input class="degree" placeholder="e.g. Diploma"></div>
        <div class="field"><label>Field of Study</label><input class="field-study" placeholder="e.g. in Digital Marketing"></div>
        <div class="field"><label>School / University</label><input class="school" placeholder="e.g. Marketing Academy"></div>
        <div class="field"><label>Year / Duration</label><input class="year" placeholder="e.g. Aug 2015 – Aug 2017"></div>
      </div>
      <div class="field"><label>Notable Achievements (optional)</label><textarea class="edu-details" placeholder="• Relevant Coursework..." style="min-height:60px;"></textarea></div>
    `;
    container.appendChild(block);
  }

  function addCert() {
    const container = document.getElementById("cert-container");
    const div = document.createElement("div");
    div.className = "cert-block";
    div.style.cssText = "display:flex;gap:12px;margin-bottom:12px;position:relative;";
    div.innerHTML = `
      <input class="cert-name" placeholder="Certification name" style="flex:2">
      <input class="cert-org" placeholder="Issuing Organization" style="flex:1">
      <button class="remove-btn" style="position:static;margin-left:4px;" onclick="this.parentElement.remove()">✕</button>
    `;
    container.appendChild(div);
  }

  function generate() {
    const data = {
      photo: window._photoData || null,
      name: document.getElementById("name").value,
      title: document.getElementById("title").value,
      phone: document.getElementById("phone").value,
      email: document.getElementById("email").value,
      address: document.getElementById("address").value,
      website: document.getElementById("website").value,
      summary: document.getElementById("summary").value,
      skills: document.getElementById("skills").value.split(",").map(s => s.trim()).filter(Boolean),
      experience: [],
      education: [],
      certifications: []
    };

    document.querySelectorAll(".exp-block").forEach(block => {
      data.experience.push({
        role: block.querySelector(".role").value,
        company: block.querySelector(".company").value,
        years: block.querySelector(".years").value,
        details: block.querySelector(".details").value
      });
    });

    document.querySelectorAll(".edu-block").forEach(block => {
      data.education.push({
        degree: block.querySelector(".degree").value,
        fieldStudy: block.querySelector(".field-study").value,
        school: block.querySelector(".school").value,
        year: block.querySelector(".year").value,
        details: block.querySelector(".edu-details").value
      });
    });

    document.querySelectorAll(".cert-block").forEach(block => {
      const name = block.querySelector(".cert-name").value;
      const org = block.querySelector(".cert-org").value;
      if (name) data.certifications.push({ name, org });
    });

    localStorage.setItem("resumeData", JSON.stringify(data));
    window.location.href = "resume.html";
  }
</script>

</body>
</html>
